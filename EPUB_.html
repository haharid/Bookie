<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPUB 만들기</title>

<script>
function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src=src;
    s.onload=()=>resolve(src);
    s.onerror=()=>reject(src);
    document.head.appendChild(s);
  });
}

async function ensureJSZip(){
  if(window.JSZip) return true;
  const urls=[
    "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js",
    "https://unpkg.com/jszip@3.10.1/dist/jszip.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
  ];
  for(const url of urls){
    try{
      await loadScript(url);
      if(window.JSZip) return true;
    }catch(e){}
  }
  return false;
}

window.addEventListener("load", async ()=>{
  const ok = await ensureJSZip();
  const el = document.getElementById("libStatus");
  el.textContent = ok ? "준비 완료" : "준비 실패";
  el.style.color = ok ? "#3f9b6b" : "#f07b9c";
});
</script>

<style>

.container{max-width:760px;margin:auto}
.card{background:white;border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.06)}

input[type=text]{flex:1;padding:11px;border-radius:12px;border:1px solid #d5e5ff;min-width:0}

img{max-width:110px;border-radius:12px;margin-top:10px;display:none}.progressBox{margin-top:10px;padding:10px;border-radius:12px;background:#f7fbff;border:1px solid #d8eaff;font-family:monospace;color:#3f6fb3;white-space:pre-wrap}

<body>

<div class="upload" id="dropZone">
<label for="txtFile" style="
display:block;

</span>

<div class="card">
<button class="primary" onclick="makeEPUB()">✨ EPUB 만들기</button>

<script>
let fileText="", lines=[], lineStarts=[], selectedIndexes=[];
let CHAPTERS_PER_FILE=30;

function log(t){
  const l=document.getElementById("log");
  l.textContent += t + "\n";
  l.scrollTop = 999999;
}

function setProgress(done,total,msg){
  const box=document.getElementById("progressBox");
  box.style.display="block";
  const pct=total ? Math.floor((done/total)*100) : 0;
  const filled=Math.max(0,Math.min(10,Math.round(pct/10)));
  const bar="█".repeat(filled)+"░".repeat(10-filled);
  box.textContent=`${bar} ${pct}%\n${done} / ${total} ${msg||"처리 중..."}`;
}

function finishProgress(){
  const box=document.getElementById("progressBox");
  box.style.display="block";
  box.textContent="██████████ 100%\n완료!";
}

function titleFromFile(name){return name.replace(/\.txt$/i,"");}

function titleFromFiles(files){
  if(files.length === 1) return titleFromFile(files[0].name);
  return titleFromFile(files[0].name) + "_합본";
}

async function readAllTxtFiles(files){
  const sorted = [...files].sort((a,b)=>a.name.localeCompare(b.name, "ko", {numeric:true}));
  const texts = [];

  for(const f of sorted){
    let t = await f.text();
    t = t.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
    if(t) texts.push(t);
  }

  return texts.join("\n\n");
}

function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
function sleep(){return new Promise(r=>setTimeout(r,0));}

function buildLineStarts(text){
  lineStarts=[0];
  for(let i=0;i<text.length;i++){
    if(text.charCodeAt(i)===10) lineStarts.push(i+1);
  }
  lineStarts.push(text.length+1);
}

function lineByIndex(i){
  const s=lineStarts[i];
  const e=Math.max(s,(lineStarts[i+1]||fileText.length)-1);
  return fileText.slice(s,e);
}

function textBetweenLines(startLine,endLine){
  const start=lineStarts[startLine+1]||fileText.length;
  const end=Math.max(start,(lineStarts[endLine]||fileText.length)-1);
  return fileText.slice(start,end);
}

function togglePanel(id){
  const p=document.getElementById(id);
  p.classList.toggle("closed");
  document.getElementById(id==="frontPanel"?"frontArrow":"tocArrow").textContent=p.classList.contains("closed")?"▸":"▾";
  if(id==="tocPanel"&&!p.classList.contains("closed")) renderToc();
}

function updateCount(){
  const b=document.getElementById("countBadge");
  if(!selectedIndexes.length){
    b.style.display="none";
    return;
  }
  b.style.display="inline-block";
  b.textContent="선택된 목차 "+selectedIndexes.length+"개";
}

document.getElementById("coverFile").addEventListener("change",e=>{
  const f=e.target.files[0];
  if(!f)return;
  const img=document.getElementById("coverPreview");
  img.src=URL.createObjectURL(f);
  img.style.display="block";
});

document.getElementById("txtFile").addEventListener("change",loadPreview);

document.getElementById("txtFile").addEventListener("change",e=>{
  const files=[...e.target.files];
  const el=document.getElementById("fileCountText");

  if(!files.length){
    el.textContent="TXT 여러 개 선택 가능 · 파일명 순서대로 합쳐져요";
    return;
  }

  el.textContent=`선택된 TXT ${files.length}개`;
});

function makeFlexiblePattern(text){
  text = (text || "").trim();

  if(/^\d+\.\s+/.test(text)){
    return /^\d+\.\s+/;
  }

  if(/^\#?\d+\s*화/.test(text)){
    return /^\#?\d+\s*화/;
  }

  if(/^\d+\s*회/.test(text)){
    return /^\d+\s*회/;
  }

  if(/^제\s*\d+\s*화/.test(text)){
    return /^제\s*\d+\s*화/;
  }

  if(/^제\s*\d+\s*장/.test(text)){
    return /^제\s*\d+\s*장/;
  }

  if(/^(프롤로그|에필로그|외전)/.test(text)){
    return /^(프롤로그|에필로그|외전)/;
  }

  return null;
}

function autoDetectChapters(){
  if(!(document.getElementById("autoDetectToc") &&
       document.getElementById("autoDetectToc").checked)){
    return;
  }

  const patterns = [
    /^#\s*\d{1,5}\s*화/,
    /^\d{1,5}\s*화/,
    /^\d{1,5}\s*편/,
    /^제\s*\d{1,5}\s*화/,
    /^제\s*\d{1,5}\s*장/,
    /^chapter\s*\d+/i,

    /^프롤로그/,
    /^prologue/i,

    /^에필로그/,
    /^epilogue/i,

    /^외전\s*\d*/,
    /^후기/,
    /^작가의 말/
  ];

  selectedIndexes = [];

  for(let i=0;i<lines.length;i++){
    const line = lines[i].trim();

    if(!line) continue;

    // 너무 긴 문장은 제외
    if(line.length > 60) continue;

    for(const p of patterns){
      if(p.test(line)){
        selectedIndexes.push(i);
        break;
      }
    }
  }

  if(selectedIndexes.length){
    renderToc();
    updateCount();

    document.getElementById("tocPanel")
      .classList.add("closed");

    document.getElementById("tocArrow")
      .textContent="▸";

    log("목차 자동 탐지: " + selectedIndexes.length + "개");
  }
}

async function loadPreview(){
  const files=[...document.getElementById("txtFile").files];
  if(!files.length){
    alert("TXT 넣어주세요!");
    return;
  }

  document.getElementById("log").textContent="";
  log(files.length + "개 TXT 읽는 중...");

  fileText=await readAllTxtFiles(files);

  detectParagraphStyle(fileText);

  lines=fileText.split("\n");
  buildLineStarts(fileText);
  selectedIndexes=[];
  document.getElementById("chapterPattern").value="";

  const html=[];
  const n=Math.min(lines.length,120);
  for(let i=0;i<n;i++){
    if(!lines[i].trim()) continue;

    html.push(`<div class="line" data-i="${i}" onclick="selectPattern(${i})"><div class="lineNo">L${i+1}</div><div class="lineText">${esc(lines[i])}</div></div>`);
  }

  document.getElementById("frontPreview").innerHTML=html.join("");
  document.getElementById("tocPreview").innerHTML="";
  document.getElementById("frontPanel").classList.add("closed");
  document.getElementById("tocPanel").classList.add("closed");
  document.getElementById("frontArrow").textContent="▸";
  document.getElementById("tocArrow").textContent="▸";

  autoDetectChapters();

  updateCount();
  log("앞부분 준비 완료");
}

function normalizePattern(line){
  line=line.trim();

  // 1. 제목
  if(/^\d+\.\s+/.test(line)) return /^\d+\.\s+.*/;

  // #1화 제목
  if(/^#\s*\d{1,5}\s*화/.test(line)) return /^#\s*\d{1,5}\s*화(?:\s+.*)?$/;

  // 1화 제목
  if(/^\d{1,5}\s*화/.test(line)) return /^\d{1,5}\s*화(?:\s+.*)?$/;

  // 1편 제목
  if(/^\d{1,5}\s*편/.test(line)) return /^\d{1,5}\s*편\s+.*/;

  // 1회 제목
  if(/^\d{1,5}\s*회/.test(line)) return /^\d{1,5}\s*회\s+.*/;

  // 제1장 제목
  if(/^제\s*\d{1,5}\s*장/.test(line)) return /^제\s*\d{1,5}\s*장\s+.*/;

  // 제1화 제목
  if(/^제\s*\d{1,5}\s*화/.test(line)) return /^제\s*\d{1,5}\s*화\s+.*/;

  // 프롤로그 / 에필로그 / 외전
  if(/^(프롤로그|에필로그|외전)/.test(line)) return /^(프롤로그|에필로그|외전).*/;

  const escaped=line.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return new RegExp("^"+escaped.replace(/\d+/g,"\\d+"));
}

function regexText(r){
  let s=r.toString();
  return s.slice(1,s.lastIndexOf("/"));
}

function selectPattern(i){

  // 이미 선택된 줄이면 선택 취소
  if(selectedIndexes.includes(i)){

    selectedIndexes = selectedIndexes.filter(v => v !== i);

    const el = document.querySelector(`.line[data-i="${i}"]`);

    if(el){
      el.classList.remove("selected","chapter");
    }

    updateCount();
    renderToc();

    return;
  }

  const line=lines[i].trim();
  if(!line)return;

  const r=normalizePattern(line);
  document.getElementById("chapterPattern").value=regexText(r);

  selectByRegex(r);

  document.getElementById("tocPanel").classList.remove("closed");
  document.getElementById("tocArrow").textContent="▾";
}

function selectByRegex(r){

  const current = new Set(selectedIndexes);

  for(let i=0;i<lines.length;i++){
    if(r.test(lines[i].trim())){
      current.add(i);
    }
  }

  selectedIndexes = [...current].sort((a,b)=>a-b);

  const set=new Set(selectedIndexes);

  document.querySelectorAll(".line").forEach(el=>{
    const i=Number(el.dataset.i);
    const ok=set.has(i);

    el.classList.toggle("selected",ok);
    el.classList.toggle("chapter",ok);
  });

  updateCount();
  renderToc();
}

function applyPattern(){
  const v=document.getElementById("chapterPattern").value;
  if(!v)return;

  try{
    selectByRegex(new RegExp(v));
    document.getElementById("tocPanel").classList.remove("closed");
    document.getElementById("tocArrow").textContent="▾";
  }catch(e){
    alert("정규식 오류!");
  }
}

function clearSelection(){
  selectedIndexes=[];
  document.querySelectorAll(".line").forEach(el=>el.classList.remove("selected","chapter"));
  document.getElementById("tocPreview").innerHTML="";
  updateCount();
}

function removeTocIndex(lineIndex){
  selectedIndexes = selectedIndexes.filter(v => v !== lineIndex);

  document.querySelectorAll(".line").forEach(el=>{
    const i=Number(el.dataset.i);
    if(i === lineIndex){
      el.classList.remove("selected","chapter");
    }
  });

  updateCount();
  renderToc();
}


function moveTocItem(index, dir){
  const newIndex = index + dir;

  if(newIndex < 0 || newIndex >= selectedIndexes.length){
    return;
  }

  const temp = selectedIndexes[index];
  selectedIndexes[index] = selectedIndexes[newIndex];
  selectedIndexes[newIndex] = temp;

  renderToc();
}

function updateTocText(lineIndex, value){
  lines[lineIndex] = value;
}

function renderToc(){
  const box=document.getElementById("tocPreview");

  if(!lines.length){
    box.innerHTML="TXT를 먼저 넣어주세요!";
    return;
  }

  if(!selectedIndexes.length){
    box.innerHTML="앞부분에서 챕터 줄을 선택해주세요!";
    return;
  }

  const html=[];
  const limit=Math.min(selectedIndexes.length,500);

  for(let i=0;i<limit;i++){

    const idx=selectedIndexes[i];

    html.push(`
      <div class="tocItem"
           draggable="true"
           data-order="${i}"
           ondragstart="dragStart(event)"
           ondragover="dragOver(event)"
           ondrop="dropItem(event)">

        <span style="
          min-width:24px;
          text-align:center;
          color:#7eb6ff;
          font-weight:700;
          user-select:none;
        ">
          ${i+1}
        </span>

        <input
          class="tocEdit"
          value="${esc(lines[idx].trim())}"
          onchange="updateTocText(${idx}, this.value)"
        >

        <button class="moveBtn"
          onclick="moveTocItem(${i}, -1)">↑</button>

        <button class="moveBtn"
          onclick="moveTocItem(${i}, 1)">↓</button>

        <button class="removeToc"
          onclick="removeTocIndex(${idx})">제외</button>
      </div>
    `);
  }

  box.innerHTML=html.join("");
}

let dragIndex = null;

function dragStart(e){
  dragIndex = Number(
    e.currentTarget.dataset.order
  );
}

function dragOver(e){
  e.preventDefault();
}

function dropItem(e){
  e.preventDefault();

  const targetIndex = Number(
    e.currentTarget.dataset.order
  );

  if(dragIndex === null) return;
  if(dragIndex === targetIndex) return;

  const moved = selectedIndexes.splice(dragIndex,1)[0];

  selectedIndexes.splice(targetIndex,0,moved);

  dragIndex = null;

  renderToc();
}


let detectedParagraphGap = 2;

function detectParagraphStyle(text){
  const sample = text.slice(0, 30000);

  const counts = {
    2: (sample.match(/\n{2}/g) || []).length,
    3: (sample.match(/\n{3}/g) || []).length,
    4: (sample.match(/\n{4}/g) || []).length
  };

  // 가장 많이 등장하는 기본 문단 간격 추정
  if(counts[3] > counts[2]){
    detectedParagraphGap = 3;
  }else{
    detectedParagraphGap = 2;
  }

  console.log("감지된 문단 간격:", detectedParagraphGap);
}

function cleanBlankOnly(text){
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");

  // nbsp 및 특수 공백 제거
  text = text
    .replace(/\u00A0/g," ")
    .replace(/[\u200B-\u200D\u2060\u2063\uFEFF]/g,"");

  if(document.getElementById("checkSpaceClean") && document.getElementById("checkSpaceClean").checked){
    text = text
      .replace(/[ \t]+$/gm,"")
      .replace(/^[ \t]+/gm,"")
      .replace(/[ \t]{2,}/g," ")
      .replace(/\n[ \t]+/g,"\n")
      .replace(/[ \t]+\n/g,"\n")
      // 문장 끝 공백 제거
      .replace(/ +(?=[.!?…"'”’)]*$)/gm,"");
  }

  // 문단 간격 자동 감지 기반 정리
  if(detectedParagraphGap === 3){
    // 기본 문단 = 줄바꿈 3개
    // 큰 공백만 압축
    text = text.replace(/\n{5,}/g,"\n\n\n\n");
  }else{
    // 기본 문단 = 줄바꿈 2개
    text = text.replace(/\n{4,}/g,"\n\n\n");
  }

  return text.trim();
}

function dialogueClean(text){
  if(!(document.getElementById("checkDialogue") && document.getElementById("checkDialogue").checked)) return text;

  return text
    // "대사." "대사." 형태 분리
    .replace(/([”"])(\s+)([“"])/g, "$1\n\n$3")
    // 닫는 따옴표 뒤 바로 다음 여는 따옴표
    .replace(/([”"])([“"])/g, "$1\n\n$2")
    // 문장 끝 따옴표 뒤 대문자/한글 대사 시작이 붙는 경우 완화
    .replace(/([.!?…][”"])(\s*)([“"])/g, "$1\n\n$3");
}

function textPartToHtml(text){
  let raw = cleanBlankOnly(text);
  raw = dialogueClean(raw);

  // 특수문자 단독 줄은 독립 문단 유지
  raw = raw.replace(
    /\n([@\]#※▶▷◆■□★☆]+)\n/g,
    '\n\n$1\n\n'
  );

  // *** 전용 토큰
  raw = raw.replace(
    /(^|\n)(\*\s*\*\s*\*|\*\*\*)(\n|$)/g,
    '\n[[STAR_BREAK]]\n'
  );

  let t = esc(raw);

  if(detectedParagraphGap === 3){

    // 줄바꿈 5개 이상 = 빈줄 유지
    t = t.replace(/\n{5,}/g,'</p><p class="txt"><br/></p><p>');

    // 줄바꿈 3개 = 일반 문단
    t = t.replace(/\n{3}/g,'</p><p>');

  }else{

    // 줄바꿈 3개 이상 = 빈줄 유지
    t = t.replace(/\n{3,}/g,'</p><p class="txt"><br/></p><p>');

    // 줄바꿈 2개 = 일반 문단
    t = t.replace(/\n{2}/g,'</p><p>');

  }

  // 일반 줄바꿈 1개는 그냥 이어쓰기
  t = t.replace(/\n/g," ");

  // *** 치환
  t = t.replace(
    /\[\[STAR_BREAK\]\]/g,
    '</p><p style="text-align: center;">* * *</p><p>'
  );

  // 문단 꼬임 정리
  t = t
    .replace(/<p><\/p>/g,'')
    .replace(/<p>\s*<p>/g,'<p>')
    .replace(/<\/p>\s*<\/p>/g,'</p>')
    // *** 앞뒤 br 제거
    .replace(/<br\/><\/p><p><br\/><\/p><p style="text-align: center;">/g,'</p><p class="txt"><br/></p><p style="text-align: center;">')
    .replace(/<p><br\/><\/p><br\/><p>/g,'<p class="txt"><br/></p><p>');

  return `<p>${t}</p>`;
}

    const indexes=[...selectedIndexes,lines.length].sort((a,b)=>a-b);
    const totalChapters=indexes.length-1;
    CHAPTERS_PER_FILE = parseInt(document.getElementById("chapterSplitMode").value, 10) || 30;
    const fileCount=Math.ceil(totalChapters/CHAPTERS_PER_FILE);
    setProgress(0,totalChapters,"챕터 처리 준비 중...");

    for(let fileNo=0; fileNo<fileCount; fileNo++){
      const startChapter=fileNo*CHAPTERS_PER_FILE;
      const endChapter=Math.min(startChapter+CHAPTERS_PER_FILE,totalChapters);
      const filename=`part${fileNo+1}.xhtml`;
      const parts=[];

      parts.push(`<?xml version="1.0" encoding="utf-8"?>

        const content=textBetweenLines(start,end);
        const href=`${filename}#ch${i+1}`;

        parts.push(`<h1 id="ch${i+1}">${esc(ch)}</h1><p class="txt"><br/></p>${textPartToHtml(content)}`);

        navNcx += `<navPoint id="nav${i+1}" playOrder="${i+1}">

</navPoint>`;

        navHtml += `<li><a href="${href}">${esc(ch)}</a></li>`;
      }

      parts.push("</body></html>");

      oebps.file(filename,parts.join(""),{compression:"STORE"});

      manifest += `<item id="part${fileNo+1}" href="${filename}" media-type="application/xhtml+xml"/>`;

      spine += `<itemref idref="part${fileNo+1}"/>`;

      setProgress(endChapter,totalChapters,"챕터 처리 중...");

const dropZone=document.getElementById("dropZone");
const txtInput=document.getElementById("txtFile");

["dragenter","dragover"].forEach(eventName=>{
  dropZone.addEventListener(eventName,e=>{
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("dragover");
  });
});

["dragleave","drop"].forEach(eventName=>{
  dropZone.addEventListener(eventName,e=>{
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("dragover");
  });
});

dropZone.addEventListener("drop",e=>{
  const files=[...e.dataTransfer.files].filter(f=>
    f.name.toLowerCase().endsWith(".txt")
  );

  if(!files.length){
    alert("TXT 파일만 넣어주세요!");
    return;
  }

  const dt=new DataTransfer();

  files.forEach(f=>dt.items.add(f));

  txtInput.files=dt.files;

  txtInput.dispatchEvent(new Event("change"));
});
