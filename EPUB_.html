<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPUB 만들기</title>

<script>
function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src=src;
    s.onload=()=>resolve(src);
    s.onerror=()=>reject(src);
    document.head.appendChild(s);
  });
}

async function ensureJSZip(){
  if(window.JSZip) return true;
  const urls=[
    "https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js",
    "https://unpkg.com/jszip@3.10.1/dist/jszip.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
  ];
  for(const url of urls){
    try{
      await loadScript(url);
      if(window.JSZip) return true;
    }catch(e){}
  }
  return false;
}

window.addEventListener("load", async ()=>{
  const ok = await ensureJSZip();
  const el = document.getElementById("libStatus");
  el.textContent = ok ? "준비 완료" : "준비 실패";
  el.style.color = ok ? "#3f9b6b" : "#f07b9c";
});
</script>

<style>
body{margin:0;padding:14px;background:#eef7ff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#50627d}

img{max-width:110px;border-radius:12px;margin-top:10px;display:none}.progressBox{margin-top:10px;padding:10px;border-radius:12px;background:#f7fbff;border:1px solid #d8eaff;font-family:monospace;color:#3f6fb3;white-space:pre-wrap}

<body>

<script>
let fileText="", lines=[], lineStarts=[], selectedIndexes=[];
let CHAPTERS_PER_FILE=30;

function log(t){
  const l=document.getElementById("log");
  l.textContent += t + "\n";
  l.scrollTop = 999999;
}

function setProgress(done,total,msg){
  const box=document.getElementById("progressBox");
  box.style.display="block";
  const pct=total ? Math.floor((done/total)*100) : 0;
  const filled=Math.max(0,Math.min(10,Math.round(pct/10)));
  const bar="█".repeat(filled)+"░".repeat(10-filled);
  box.textContent=`${bar} ${pct}%\n${done} / ${total} ${msg||"처리 중..."}`;
}

function finishProgress(){
  const box=document.getElementById("progressBox");
  box.style.display="block";
  box.textContent="██████████ 100%\n완료!";
}

function titleFromFile(name){return name.replace(/\.txt$/i,"");}

function titleFromFiles(files){
  if(files.length === 1) return titleFromFile(files[0].name);
  return titleFromFile(files[0].name) + "_합본";
}

async function readAllTxtFiles(files){
  const sorted = [...files].sort((a,b)=>a.name.localeCompare(b.name, "ko", {numeric:true}));
  const texts = [];

  for(const f of sorted){
    let t = await f.text();
    t = t.replace(/\r\n/g,"\n").replace(/\r/g,"\n").trim();
    if(t) texts.push(t);
  }

  return texts.join("\n\n");
}

function esc(s){
  return String(s||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
function sleep(){return new Promise(r=>setTimeout(r,0));}

function buildLineStarts(text){
  lineStarts=[0];
  for(let i=0;i<text.length;i++){
    if(text.charCodeAt(i)===10) lineStarts.push(i+1);
  }
  lineStarts.push(text.length+1);
}

function lineByIndex(i){
  const s=lineStarts[i];
  const e=Math.max(s,(lineStarts[i+1]||fileText.length)-1);
  return fileText.slice(s,e);
}

function textBetweenLines(startLine,endLine){
  const start=lineStarts[startLine+1]||fileText.length;
  const end=Math.max(start,(lineStarts[endLine]||fileText.length)-1);
  return fileText.slice(start,end);
}

function togglePanel(id){
  const p=document.getElementById(id);
  p.classList.toggle("closed");
  document.getElementById(id==="frontPanel"?"frontArrow":"tocArrow").textContent=p.classList.contains("closed")?"▸":"▾";
  if(id==="tocPanel"&&!p.classList.contains("closed")) renderToc();
}

function updateCount(){
  const b=document.getElementById("countBadge");
  if(!selectedIndexes.length){
    b.style.display="none";
    return;
  }
  b.style.display="inline-block";
  b.textContent="선택된 목차 "+selectedIndexes.length+"개";
}

document.getElementById("coverFile").addEventListener("change",e=>{
  const f=e.target.files[0];
  if(!f)return;
  const img=document.getElementById("coverPreview");
  img.src=URL.createObjectURL(f);
  img.style.display="block";
});

document.getElementById("txtFile").addEventListener("change",loadPreview);

document.getElementById("txtFile").addEventListener("change",e=>{
  const files=[...e.target.files];
  const el=document.getElementById("fileCountText");

  if(!files.length){
    el.textContent="TXT 여러 개 선택 가능 · 파일명 순서대로 합쳐져요";
    return;
  }

  el.textContent=`선택된 TXT ${files.length}개`;
});



function autoDetectChapters(){
  if(!(document.getElementById("autoDetectToc") &&
       document.getElementById("autoDetectToc").checked)){
    return;
  }

  const patterns = [
    /^#\s*\d{1,5}\s*화/,
    /^\d{1,5}\s*화/,
    /^\d{1,5}\s*편/,
    /^제\s*\d{1,5}\s*화/,
    /^제\s*\d{1,5}\s*장/,
    /^chapter\s*\d+/i,

    /^프롤로그/,
    /^prologue/i,

    /^에필로그/,
    /^epilogue/i,

    /^외전\s*\d*/,
    /^후기/,
    /^작가의 말/
  ];

  selectedIndexes = [];

  for(let i=0;i<lines.length;i++){
    const line = lines[i].trim();

    if(!line) continue;

    // 너무 긴 문장은 제외
    if(line.length > 60) continue;

    for(const p of patterns){
      if(p.test(line)){
        selectedIndexes.push(i);
        break;
      }
    }
  }

  if(selectedIndexes.length){
    renderToc();
    updateCount();

    document.getElementById("tocPanel")
      .classList.remove("closed");

    document.getElementById("tocArrow")
      .textContent="▾";

    log("목차 자동 탐지: " + selectedIndexes.length + "개");
  }
}


async function loadPreview(){
  const files=[...document.getElementById("txtFile").files];
  if(!files.length){
    alert("TXT 넣어주세요!");
    return;
  }

  document.getElementById("log").textContent="";
  log(files.length + "개 TXT 읽는 중...");

  fileText=await readAllTxtFiles(files);
  lines=fileText.split("\n");
  buildLineStarts(fileText);
  selectedIndexes=[];
  document.getElementById("chapterPattern").value="";

  const html=[];
  const n=Math.min(lines.length,120);
  for(let i=0;i<n;i++){
    html.push(`<div class="line" data-i="${i}" onclick="selectPattern(${i})"><div class="lineNo">L${i+1}</div><div class="lineText">${esc(lines[i]||" ")}</div></div>`);
  }

  document.getElementById("frontPreview").innerHTML=html.join("");
  document.getElementById("tocPreview").innerHTML="";
  document.getElementById("frontPanel").classList.remove("closed");
  document.getElementById("tocPanel").classList.add("closed");
  document.getElementById("frontArrow").textContent="▾";
  document.getElementById("tocArrow").textContent="▸";

  autoDetectChapters();

  updateCount();
  log("앞부분 준비 완료");
}

function normalizePattern(line){
  line=line.trim();

  if(/^#\s*\d{1,5}\s*화/.test(line)) return /^#\s*\d{1,5}\s*화/;
  if(/^\d{1,5}\s*화/.test(line)) return /^\d{1,5}\s*화/;
  if(/^\d{1,5}\s*편/.test(line)) return /^\d{1,5}\s*편/;
  if(/^제\s*\d{1,5}\s*장/.test(line)) return /^제\s*\d{1,5}\s*장/;
  if(/^제\s*\d{1,5}\s*화/.test(line)) return /^제\s*\d{1,5}\s*화/;
  if(/^#\s*제\s*\d{1,5}\s*화/.test(line)) return /^#\s*제\s*\d{1,5}\s*화/;
  if(/^\[\s*\d{1,5}\s*\]/.test(line)) return /^\[\s*\d{1,5}\s*\]/;
  if(/^<\s*\d{1,5}\s*>/.test(line)) return /^<\s*\d{1,5}\s*>/;
  if(/^〈\s*\d{1,5}\s*〉/.test(line)) return /^〈\s*\d{1,5}\s*〉/;
  if(/^chapter\s*\d{1,5}/i.test(line)) return /^chapter\s*\d{1,5}/i;
  if(/^외전\s*\d*/.test(line)) return /^외전\s*\d*/;

  // #66 지금의 내가, #1 어쩌구처럼 뒤 제목이 달라도 #숫자까지만 기준으로 잡기
  if(/^#\s*\d{1,5}/.test(line)) return /^#\s*\d{1,5}/;

  const escaped=line.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return new RegExp("^"+escaped.replace(/\d+/g,"\\d+"));
}

function regexText(r){
  let s=r.toString();
  return s.slice(1,s.lastIndexOf("/"));
}

function selectPattern(i){
  const line=lines[i].trim();
  if(!line)return;

  const r=normalizePattern(line);
  document.getElementById("chapterPattern").value=regexText(r);

  selectByRegex(r);

  document.getElementById("tocPanel").classList.remove("closed");
  document.getElementById("tocArrow").textContent="▾";
}

function selectByRegex(r){
  selectedIndexes=[];

  for(let i=0;i<lines.length;i++){
    if(r.test(lines[i].trim())) selectedIndexes.push(i);
  }

  const set=new Set(selectedIndexes);
  document.querySelectorAll(".line").forEach(el=>{
    const i=Number(el.dataset.i);
    const ok=set.has(i);
    el.classList.toggle("selected",ok);
    el.classList.toggle("chapter",ok);
  });

  updateCount();
  renderToc();
}

function applyPattern(){
  const v=document.getElementById("chapterPattern").value;
  if(!v)return;

  try{
    selectByRegex(new RegExp(v));
    document.getElementById("tocPanel").classList.remove("closed");
    document.getElementById("tocArrow").textContent="▾";
  }catch(e){
    alert("정규식 오류!");
  }
}

function clearSelection(){
  selectedIndexes=[];
  document.querySelectorAll(".line").forEach(el=>el.classList.remove("selected","chapter"));
  document.getElementById("tocPreview").innerHTML="";
  updateCount();
}

function removeTocIndex(lineIndex){
  selectedIndexes = selectedIndexes.filter(v => v !== lineIndex);

  document.querySelectorAll(".line").forEach(el=>{
    const i=Number(el.dataset.i);
    if(i === lineIndex){
      el.classList.remove("selected","chapter");
    }
  });

  updateCount();
  renderToc();
}

function renderToc(){
  const box=document.getElementById("tocPreview");

  if(!lines.length){
    box.innerHTML="TXT를 먼저 넣어주세요!";
    return;
  }

  if(!selectedIndexes.length){
    box.innerHTML="앞부분에서 챕터 줄을 선택해주세요!";
    return;
  }

  const html=[];
  const limit=Math.min(selectedIndexes.length,500);

  for(let i=0;i<limit;i++){
    const idx=selectedIndexes[i];
    html.push(`<div class="tocItem"><span class="tocText">${i+1}. ${esc(lines[idx].trim())}</span><button class="removeToc" onclick="removeTocIndex(${idx})">제외</button></div>`);
  }

  if(selectedIndexes.length>500){
    html.push(`<div class="tocItem">... ${selectedIndexes.length-500}개 더 있음</div>`);
  }

  box.innerHTML=html.join("");
}

function cleanBlankOnly(text){
  text = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");

  // nbsp 및 특수 공백 제거
  text = text
    .replace(/\u00A0/g," ")
    .replace(/[\u200B-\u200D\u2060\u2063\uFEFF]/g,"");

  if(document.getElementById("checkSpaceClean") && document.getElementById("checkSpaceClean").checked){
    text = text
      .replace(/[ \t]+$/gm,"")
      .replace(/^[ \t]+/gm,"")
      .replace(/[ \t]{2,}/g," ")
      .replace(/\n[ \t]+/g,"\n")
      .replace(/[ \t]+\n/g,"\n")
      // 문장 끝 공백 제거
      .replace(/ +(?=[.!?…"'”’)]*$)/gm,"");
  }

  // 빈줄 2개 이상이면 "빈줄 1개" 유지
  // 즉 줄바꿈 3개 이상 -> 줄바꿈 2개
  // 너무 많은 빈줄만 정리
  text = text.replace(/\n{4,}/g,"\n\n\n");

  return text.trim();
}

function dialogueClean(text){
  if(!(document.getElementById("checkDialogue") && document.getElementById("checkDialogue").checked)) return text;

  return text
    // "대사." "대사." 형태 분리
    .replace(/([”"])(\s+)([“"])/g, "$1\n\n$3")
    // 닫는 따옴표 뒤 바로 다음 여는 따옴표
    .replace(/([”"])([“"])/g, "$1\n\n$2")
    // 문장 끝 따옴표 뒤 대문자/한글 대사 시작이 붙는 경우 완화
    .replace(/([.!?…][”"])(\s*)([“"])/g, "$1\n\n$3");
}

function textPartToHtml(text){
  let raw = cleanBlankOnly(text);
  raw = dialogueClean(raw);

  // 특수문자 단독 줄은 독립 문단 유지
  raw = raw.replace(
    /\n([@\]#※▶▷◆■□★☆]+)\n/g,
    '\n\n$1\n\n'
  );

  // *** 전용 토큰
  raw = raw.replace(
    /(^|\n)(\*\s*\*\s*\*|\*\*\*)(\n|$)/g,
    '\n[[STAR_BREAK]]\n'
  );

  let t = esc(raw);

  // 빈줄 2개 이상(줄바꿈 3개 이상) = 빈줄 1개 유지
  t = t.replace(/\n{3,}/g,'</p><p class="txt"><br/></p><p>');

  // 일반 문단 분리(줄바꿈 2개)
  t = t.replace(/\n{2}/g,'</p><p>');

  // 일반 줄바꿈 1개는 그냥 이어쓰기
  t = t.replace(/\n/g," ");

  // *** 치환
  t = t.replace(
    /\[\[STAR_BREAK\]\]/g,
    '</p><p style="text-align: center;">* * *</p><p>'
  );

  // 문단 꼬임 정리
  t = t
    .replace(/<p><\/p>/g,'')
    .replace(/<p>\s*<p>/g,'<p>')
    .replace(/<\/p>\s*<\/p>/g,'</p>')
    // *** 앞뒤 br 제거
    .replace(/<br\/><\/p><p><br\/><\/p><p style="text-align: center;">/g,'</p><p class="txt"><br/></p><p style="text-align: center;">')
    .replace(/<p><br\/><\/p><br\/><p>/g,'<p class="txt"><br/></p><p>');

  return `<p>${t}</p>`;
}

async function makeEPUB(){
  try{
    const loaded = await ensureJSZip();
    if(!loaded || !window.JSZip){
      alert("준비 실패! 인터넷 연결 후 새로고침해줘.");
      return;
    }

    const files=[...document.getElementById("txtFile").files];

    if(!files.length){
      alert("TXT 넣어주세요!");
      return;
    }

    if(!fileText){
      fileText=await readAllTxtFiles(files);
      lines=fileText.split("\n");
      buildLineStarts(fileText);
    }

    if(!selectedIndexes.length){
      alert("챕터 줄을 선택해주세요!");
      return;
    }

    document.getElementById("log").textContent="";
    document.getElementById("progressBox").style.display="none";
    const customTitle = (
      document.getElementById("bookTitle").value || ""
    ).trim();

    const title = customTitle || titleFromFiles(files);
    const author=(document.getElementById("authorName").value||"").trim();
    log("EPUB 생성 시작...");
    await sleep();

    const zip=new JSZip();

    zip.file("mimetype","application/epub+zip",{compression:"STORE"});

    zip.folder("META-INF").file("container.xml",
`<?xml version="1.0"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
<rootfiles>
<rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
</rootfiles>
</container>`,{compression:"STORE"});

    const oebps=zip.folder("OEBPS");

    oebps.file("style.css",
`p {
  font-size: 1em;
  line-height: 180%;
  text-indent: 0.9em;
  display: block;
  margin-bottom: 0.6em;
  margin-left: 0.1em;
  margin-right: 0.1em;
  margin-top: 0.6em;
}

.txt {
  font-size: 1em;
  line-height: 180%;
  text-indent: 0.9em;
  display: block;
  margin-bottom: 0.6em;
  margin-left: 0.1em;
  margin-right: 0.1em;
  margin-top: 0.6em;
}

body {
  display: block;
  font-size: 1em;
  text-align: justify;
  margin: 0.1em;
}

h1 {
  text-align: center;
  text-indent: 0;
  font-size: 1.2em;
}`,{compression:"STORE"});

    let manifest=`<item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
<item id="nav" href="nav.xhtml" media-type="application/xhtml+xml" properties="nav"/>
<item id="css" href="style.css" media-type="text/css"/>`;

    let spine="";
    let navNcx="";
    let navHtml="";

    const cover=document.getElementById("coverFile").files[0];

    if(cover){
      log("표지 처리 중...");
      const ext=cover.name.split(".").pop().toLowerCase();
      const mime=ext==="jpg"?"jpeg":ext;

      oebps.file(`cover.${ext}`,await cover.arrayBuffer(),{compression:"STORE"});

      oebps.file("cover.xhtml",
`<?xml version="1.0" encoding="utf-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta name="viewport" content="width=device-width,height=device-height"/>
<style>
@page {
  margin:0;
  padding:0;
}

html, body {
  margin:0;
  padding:0;
  background:#ffffff;
}

body{
  text-align:center;
  line-height:0;
  font-size:0;
}

img{
  display:block;
  width:100%;
  height:auto;
  margin:0 auto;
}
</style>
</head>
<body>
<img src="cover.${ext}" alt="cover"/>
</body>
</html>`,{compression:"STORE"});



      manifest += `<item id="coverimg" href="cover.${ext}" media-type="image/${mime}" properties="cover-image"/>
<item id="cover" href="cover.xhtml" media-type="application/xhtml+xml"/>
`;


    }

    const indexes=[...selectedIndexes,lines.length].sort((a,b)=>a-b);
    const totalChapters=indexes.length-1;
    CHAPTERS_PER_FILE = parseInt(document.getElementById("chapterSplitMode").value, 10) || 30;
    const fileCount=Math.ceil(totalChapters/CHAPTERS_PER_FILE);
    setProgress(0,totalChapters,"챕터 처리 준비 중...");

    for(let fileNo=0; fileNo<fileCount; fileNo++){
      const startChapter=fileNo*CHAPTERS_PER_FILE;
      const endChapter=Math.min(startChapter+CHAPTERS_PER_FILE,totalChapters);
      const filename=`part${fileNo+1}.xhtml`;
      const parts=[];

      parts.push(`<?xml version="1.0" encoding="utf-8"?>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<title>${esc(title)} ${fileNo+1}</title>
<link rel="stylesheet" type="text/css" href="style.css"/>
</head>
<body>`);

      for(let i=startChapter;i<endChapter;i++){
        const start=indexes[i];
        const end=indexes[i+1];
        const ch=lineByIndex(start).trim()||`Chapter ${i+1}`;
        const content=textBetweenLines(start,end);
        const href=`${filename}#ch${i+1}`;

        parts.push(`<h1 id="ch${i+1}">${esc(ch)}</h1><p class="txt"><br/></p>${textPartToHtml(content)}`);

        navNcx += `<navPoint id="nav${i+1}" playOrder="${i+1}">
<navLabel><text>${esc(ch)}</text></navLabel>
<content src="${href}"/>
</navPoint>`;

        navHtml += `<li><a href="${href}">${esc(ch)}</a></li>`;
      }

      parts.push("</body></html>");

      oebps.file(filename,parts.join(""),{compression:"STORE"});

      manifest += `<item id="part${fileNo+1}" href="${filename}" media-type="application/xhtml+xml"/>`;

      spine += `<itemref idref="part${fileNo+1}"/>`;

      setProgress(endChapter,totalChapters,"챕터 처리 중...");
      log(`${endChapter}/${totalChapters} 챕터 처리 완료`);

      await sleep();
    }

    log("목차 저장 중...");

    oebps.file("nav.xhtml",
`<?xml version="1.0" encoding="utf-8"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops">
<head>
<title>목차</title>
</head>
<body>
<nav epub:type="toc" id="toc">
<h1>목차</h1>
<ol>
${navHtml}
</ol>
</nav>
</body>
</html>`,{compression:"STORE"});

    oebps.file("toc.ncx",
`<?xml version="1.0" encoding="UTF-8"?>
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1">
<head>
<meta name="dtb:uid" content="bookid"/>
<meta name="dtb:depth" content="1"/>
<meta name="dtb:totalPageCount" content="0"/>
<meta name="dtb:maxPageNumber" content="0"/>
</head>
<docTitle><text>${esc(title)}</text></docTitle>
<navMap>${navNcx}</navMap>
</ncx>`,{compression:"STORE"});

    oebps.file("content.opf",
`<?xml version="1.0" encoding="UTF-8"?>
<package version="3.0" unique-identifier="bookid" xmlns="http://www.idpf.org/2007/opf">
<metadata xmlns:dc="http://purl.org/dc/elements/1.1/">
<dc:identifier id="bookid">bookid-${Date.now()}</dc:identifier>
<dc:title>${esc(title)}</dc:title>
${author ? `<dc:creator>${esc(author)}</dc:creator>` : ""}
<dc:language>ko</dc:language>
<meta property="rendition:layout">reflowable</meta>
<meta property="rendition:spread">none</meta>
<meta name="cover" content="coverimg"/>
<meta property="dcterms:modified">2026-01-01T00:00:00Z</meta>
</metadata>
<manifest>${manifest}</manifest>
<spine toc="ncx">${spine}</spine>
</package>`,{compression:"STORE"});

    log("EPUB 파일 만드는 중...");

    const blob=await zip.generateAsync({
      type:"blob",
      compression:"STORE",
      mimeType:"application/epub+zip"
    });

    log("다운로드 시작...");

    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");

    a.href=url;
    const safeAuthor = author ? author.trim() : "";

    a.download = safeAuthor
      ? `${title}-${safeAuthor}.epub`
      : `${title}.epub`;

    document.body.appendChild(a);
    a.click();

    setTimeout(()=>{
      URL.revokeObjectURL(url);
      a.remove();
    },3000);

    finishProgress();
    log("완료!");

  }catch(e){
    log("오류: "+(e && e.message ? e.message : e));
    alert("오류가 났어: "+(e && e.message ? e.message : e));
  }
}

const dropZone=document.getElementById("dropZone");
const txtInput=document.getElementById("txtFile");

["dragenter","dragover"].forEach(eventName=>{
  dropZone.addEventListener(eventName,e=>{
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.add("dragover");
  });
});

["dragleave","drop"].forEach(eventName=>{
  dropZone.addEventListener(eventName,e=>{
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove("dragover");
  });
});

dropZone.addEventListener("drop",e=>{
  const files=[...e.dataTransfer.files].filter(f=>
    f.name.toLowerCase().endsWith(".txt")
  );

  if(!files.length){
    alert("TXT 파일만 넣어주세요!");
    return;
  }

  const dt=new DataTransfer();

  files.forEach(f=>dt.items.add(f));

  txtInput.files=dt.files;

  txtInput.dispatchEvent(new Event("change"));
});

</script>
</body>
</html>
